<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 9: Derived State & Filtering</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 40px; }
        .dashboard { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h1 { text-align: center; color: #38bdf8; margin-top: 0; }
        
        /* Stats Header */
        .stats-grid { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; background: #0f172a; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #334155; }
        .stat-num { font-size: 24px; font-weight: bold; color: #38bdf8; }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }

        /* Filter Tabs */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #0f172a; padding: 6px; border-radius: 8px; }
        .filter-btn { flex: 1; background: transparent; border: none; color: #94a3b8; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: #38bdf8; color: #0f172a; }

        /* List Layout */
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 16px; border-radius: 10px; border: 1px solid #334155; }
        .task-text.strike { text-decoration: line-through; color: #94a3b8; }
        .btn-status { border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-pending { background: #eab308; color: #451a03; }
        .btn-done { background: #22c55e; color: white; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        function App() {
            const [tasks, setTasks] = React.useState([
                { id: 1, text: "Master React Hooks", isCompleted: true },
                { id: 2, text: "Understand Derived State", isCompleted: false },
                { id: 3, text: "Deploy to Production", isCompleted: false }
            ]);
            
            // 1. THE FILTER STATE
            const [currentFilter, setCurrentFilter] = React.useState("all"); // Options: "all", "pending", "completed"

            // 2. DERIVED STATE (Calculated instantly on every render)
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(task => task.isCompleted).length;
            const completionPercentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

            // 3. FILTERING LOGIC (Derived based on currentFilter selection)
            const filteredTasks = tasks.filter(task => {
                if (currentFilter === "pending") return !task.isCompleted;
                if (currentFilter === "completed") return task.isCompleted;
                return true; // "all"
            });

            function handleToggleStatus(taskId) {
                setTasks(tasks.map(task => 
                    task.id === taskId ? { ...task, isCompleted: !task.isCompleted } : task
                ));
            }

            return (
                <div className="dashboard">
                    <h1>Journey Analytics Board</h1>
                    
                    {/* Displaying our Derived State Analytics */}
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-num">{totalTasks}</div>
                            <div className="stat-label">Total Milestones</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-num">{completionPercentage}%</div>
                            <div className="stat-label">Progress</div>
                        </div>
                    </div>

                    {/* Filter Tabs Controller */}
                    <div className="filter-bar">
                        <button 
                            className={`filter-btn ${currentFilter === 'all' ? 'active' : ''}`}
                            onClick={() => setCurrentFilter("all")}
                        >All</button>
                        <button 
                            className={`filter-btn ${currentFilter === 'pending' ? 'active' : ''}`}
                            onClick={() => setCurrentFilter("pending")}
                        >In Progress</button>
                        <button 
                            className={`filter-btn ${currentFilter === 'completed' ? 'active' : ''}`}
                            onClick={() => setCurrentFilter("completed")}
                        >Completed</button>
                    </div>

                    {/* Dynamic Task List */}
                    <div className="task-list">
                        {filteredTasks.map((task) => (
                            <div key={task.id} className="task-item">
                                <span className={`task-text ${task.isCompleted ? 'strike' : ''}`}>
                                    {task.text}
                                </span>
                                <button 
                                    className={`btn-status ${task.isCompleted ? 'btn-done' : 'btn-pending'}`}
                                    onClick={() => handleToggleStatus(task.id)}
                                >
                                    {task.isCompleted ? "✓ Done" : "⏳ Working"}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
