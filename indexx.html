<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 1: My First React Component</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 300px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: #61dafb; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .btn { background: #61dafb; color: #20232a; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 12px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // This is your very first reusable COMPONENT!
        function ProfileCard() {
            return (
                <div className="card">
                    <div className="avatar">🐱‍🏍</div>
                    <h2>React Learner </h2>
                    <p>Day 1 of building a comprehensive React learning repository from scratch.</p>
                    <a href="https://github.com/pujaux" target="_blank" className="btn">View My GitHub</a>
                </div>
            );
        }

        // This tells React to take our Component and display it inside the "root" div
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<ProfileCard />);

    </script>
</body>
</html>
