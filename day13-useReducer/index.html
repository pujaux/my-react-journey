<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 13: The useReducer Hook</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 40px; }
        .cart-card { max-width: 400px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; }
        h1 { color: #38bdf8; text-align: center; margin-top: 0; }
        .product-info { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .price { color: #38bdf8; font-weight: bold; }
        .controls { display: flex; gap: 15px; align-items: center; justify-content: center; margin-bottom: 20px; }
        button { border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-action { background: #334155; color: white; font-size: 18px; }
        .btn-action:hover { background: #475569; }
        .btn-reset { background: #ef4444; color: white; width: 100%; margin-top: 10px; }
        .totals { border-top: 1px solid #334155; padding-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; }
        .grand-total { font-size: 18px; font-weight: bold; color: #22c55e; border-top: 1px dashed #334155; padding-top: 8px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">

        // 1. INITIAL STATE OBJECT
        const initialState = { quantity: 1, basePrice: 29, shipping: 5 };

        // 2. THE REDUCER FUNCTION (The State Machine)
        // Must return a brand new state object based on the incoming action type
        function cartReducer(state, action) {
            switch (action.type) {
                case "increment":
                    return { ...state, quantity: state.quantity + 1 };
                case "decrement":
                    return { ...state, quantity: Math.max(1, state.quantity - 1) };
                case "reset":
                    return initialState;
                default:
                    return state;
            }
        }

        function App() {
            // 3. INITIALIZE USEREDUCER
            // Returns the current state object and a dispatch function
            const [state, dispatch] = React.useReducer(cartReducer, initialState);

            // Derived State
            const itemsTotal = state.quantity * state.basePrice;
            const finalTotal = itemsTotal + state.shipping;

            return (
                <div className="cart-card">
                    <h1>Order Checkout</h1>
                    
                    <div className="product-info">
                        <div>
                            <strong>React Masterclass Course</strong>
                            <div style={{fontSize: '12px', color: '#94a3b8'}}>Lifetime Access</div>
                        </div>
                        <span className="price">${state.basePrice}</span>
                    </div>

                    <div className="controls">
                        {/* 4. DISPATCHING ACTIONS */}
                        <button className="btn-action" onClick={() => dispatch({ type: "decrement" })}>-</button>
                        <span style={{fontSize: '20px', fontWeight: 'bold'}}>{state.quantity}</span>
                        <button className="btn-action" onClick={() => dispatch({ type: "increment" })}>+</button>
                    </div>

                    <div className="totals">
                        <div className="row"><span>Items total:</span><span>${itemsTotal}</span></div>
                        <div className="row"><span>Shipping:</span><span>${state.shipping}</span></div>
                        <div className="row grand-total"><span>Grand Total:</span><span>${finalTotal}</span></div>
                    </div>

                    <button className="btn-reset" onClick={() => dispatch({ type: "reset" })}>Reset Cart</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
